<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Form</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #1a1f2e;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .form-container {
    width: 100%;
    max-width: 560px;
  }

  h2 {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 2rem;
    color: #f1f5f9;
  }

  .form-group {
    margin-bottom: 1.5rem;
  }

  label {
    display: block;
    font-size: 0.95rem;
    font-weight: 500;
    margin-bottom: 0.5rem;
    color: #cbd5e1;
  }

  label .required {
    color: #f87171;
    margin-left: 2px;
  }

  .name-row {
    display: flex;
    gap: 1rem;
  }

  .name-row .field {
    flex: 1;
  }

  input, textarea {
    width: 100%;
    padding: 0.85rem 1rem;
    background: #f8fafc;
    border: 2px solid transparent;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.95rem;
    color: #1e293b;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input::placeholder, textarea::placeholder {
    color: #94a3b8;
  }

  input:focus, textarea:focus {
    outline: none;
    border-color: #4f8cff;
    box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.15);
  }

  textarea {
    min-height: 160px;
    resize: vertical;
  }

  /* --- Honeypot: Botlara tuzak, kullanıcıya görünmez --- */
  .hp-field {
    position: absolute;
    left: -9999px;
    opacity: 0;
    height: 0;
    width: 0;
    overflow: hidden;
  }

  button[type="submit"] {
    width: 100%;
    padding: 1rem;
    background: #4f8cff;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 0.5rem;
  }

  button[type="submit"]:hover {
    background: #3b7aed;
  }

  button[type="submit"]:active {
    transform: scale(0.98);
  }

  button[type="submit"]:disabled {
    background: #64748b;
    cursor: not-allowed;
    transform: none;
  }

  .status-msg {
    text-align: center;
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-size: 0.9rem;
    display: none;
  }

  .status-msg.success {
    display: block;
    background: rgba(34, 197, 94, 0.12);
    color: #4ade80;
    border: 1px solid rgba(34, 197, 94, 0.25);
  }

  .status-msg.error {
    display: block;
    background: rgba(248, 113, 113, 0.12);
    color: #f87171;
    border: 1px solid rgba(248, 113, 113, 0.25);
  }

  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="form-container">
  <h2>Contact Us</h2>

  <form id="contactForm">
    <!-- Your Info -->
    <div class="form-group">
      <label>Your Info <span class="required">*</span></label>
      <div class="name-row">
        <div class="field">
          <input type="text" name="firstName" placeholder="First Name" required>
        </div>
        <div class="field">
          <input type="text" name="lastName" placeholder="Last Name">
        </div>
      </div>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label>Email <span class="required">*</span></label>
      <input type="email" name="email" placeholder="example@example.com" required>
    </div>

    <!-- Company Name -->
    <div class="form-group">
      <label>Company Name <span class="required">*</span></label>
      <input type="text" name="companyName" required>
    </div>

    <!-- Message -->
    <div class="form-group">
      <label>Let us know how we can help you! <span class="required">*</span></label>
      <textarea name="message" placeholder="Your message..." required></textarea>
    </div>

    <!-- Honeypot: Bot tuzağı -->
    <div class="hp-field" aria-hidden="true">
      <input type="text" name="website" tabindex="-1" autocomplete="off">
    </div>

    <button type="submit">Send Message</button>
    <div id="statusMsg" class="status-msg"></div>
  </form>
</div>

<script>
  // =====================================================
  //  KURULUM: Aşağıdaki URL'yi Power Automate'ten aldığınız
  //  HTTP POST URL ile değiştirin
  // =====================================================
  const FLOW_URL = 'BURAYA_POWER_AUTOMATE_URL_YAPISTIRIN';

  // =====================================================
  //  SPAM KORUMA KATMANLARI
  //
  //  1. Honeypot       → Gizli alan, botlar doldurur, insanlar görmez
  //  2. Zamanlama       → Formu 3 saniyeden kısa sürede dolduran reddedilir
  //  3. Rate Limiting   → Aynı tarayıcıdan 2 dk içinde tekrar gönderilemez
  //  4. Basit Token     → JS ile üretilir, bot scripti genelde üretemez
  // =====================================================

  const form = document.getElementById('contactForm');
  const statusMsg = document.getElementById('statusMsg');
  const submitBtn = form.querySelector('button[type="submit"]');

  // Sayfa yüklenme zamanı (zamanlama kontrolü için)
  const pageLoadTime = Date.now();

  // Basit token üretici (JS çalıştıramayan botları filtreler)
  function generateToken() {
    const now = Date.now();
    // Basit bir hash: timestamp + sabit bir string birleşimi
    return btoa('form-' + now + '-valid').substring(0, 24);
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    // --- SPAM KONTROL 1: Honeypot ---
    if (form.querySelector('input[name="website"]').value !== '') {
      // Bot yakalandı, sahte başarı göster
      statusMsg.className = 'status-msg success';
      statusMsg.textContent = 'Message sent successfully!';
      form.reset();
      return;
    }

    // --- SPAM KONTROL 2: Zamanlama (3 saniyeden hızlı = bot) ---
    const elapsed = (Date.now() - pageLoadTime) / 1000;
    if (elapsed < 3) {
      statusMsg.className = 'status-msg success';
      statusMsg.textContent = 'Message sent successfully!';
      form.reset();
      return;
    }

    // --- SPAM KONTROL 3: Rate Limiting (tarayıcı tarafı) ---
    const lastSubmit = sessionStorage.getItem('lastFormSubmit');
    if (lastSubmit && (Date.now() - parseInt(lastSubmit)) < 120000) {
      statusMsg.className = 'status-msg error';
      statusMsg.textContent = 'Please wait a few minutes before sending another message.';
      return;
    }

    // Butonu devre dışı bırak
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span> Sending...';
    statusMsg.className = 'status-msg';
    statusMsg.style.display = 'none';

    // Form verileri
    const payload = {
      firstName:   form.firstName.value.trim(),
      lastName:    form.lastName.value.trim(),
      email:       form.email.value.trim(),
      companyName: form.companyName.value.trim(),
      message:     form.message.value.trim(),
      _timestamp:  new Date().toISOString(),
      _hp:         '',                     // Honeypot boş olmalı
      _token:      generateToken()         // JS token
    };

    try {
      const res = await fetch(FLOW_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (res.ok) {
        statusMsg.className = 'status-msg success';
        statusMsg.textContent = 'Message sent successfully! We\'ll get back to you soon.';
        sessionStorage.setItem('lastFormSubmit', Date.now().toString());
        form.reset();
      } else {
        throw new Error('Server error');
      }

    } catch (err) {
      statusMsg.className = 'status-msg error';
      statusMsg.textContent = 'Something went wrong. Please try again later.';
    }

    submitBtn.disabled = false;
    submitBtn.innerHTML = 'Send Message';
  });
</script>

</body>
</html>
